name: Publish patched issuer-api TEST

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag to publish (e.g. 0.21.3-mdl-patch)'
        required: true
        default: 'v0.21.3-mdl-patch'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Publish image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: ./gradlew :waltid-services:waltid-issuer-api:publishImage
